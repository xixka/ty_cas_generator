<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天翼云盘秒传 JSON 生成器</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/spark-md5@3.0.2/spark-md5.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --border: #334155;
  --text: #e2e8f0;
  --dim: #94a3b8;
  --accent: #3b82f6;
  --accent-h: #2563eb;
  --ok: #22c55e;
  --err: #ef4444;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px;
}
.wrap { max-width: 800px; margin: 0 auto; }
h1 { font-size: 22px; margin-bottom: 4px; }
.sub { color: var(--dim); font-size: 13px; margin-bottom: 20px; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
}
.card-t { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.drop {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 28px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
}
.drop:hover, .drop.over { border-color: var(--accent); background: rgba(59,130,246,.05); }
.drop-icon { font-size: 28px; margin-bottom: 6px; }
.drop-text { color: var(--dim); font-size: 13px; }
input[type=file] { display: none; }
.flist { margin-top: 12px; }
.frow {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 13px;
}
.frow.done { border-left: 3px solid var(--ok); }
.frow.work { border-left: 3px solid var(--accent); }
.frow.fail { border-left: 3px solid var(--err); }
.frow .name { flex: 1; word-break: break-all; }
.frow .size { color: var(--dim); white-space: nowrap; font-family: monospace; }
.frow .st { font-size: 12px; white-space: nowrap; min-width: 40px; text-align: right; }
.st.done { color: var(--ok); }
.st.work { color: var(--accent); }
.st.fail { color: var(--err); }
.st.wait { color: var(--dim); }
.pbar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 4px;
  overflow: hidden;
}
.pbar > div { height: 100%; background: var(--accent); transition: width .2s; }
.btns { display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
  padding: 9px 18px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
}
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-p { background: var(--accent); color: #fff; }
.btn-p:hover:not(:disabled) { background: var(--accent-h); }
.btn-s { background: var(--border); color: var(--text); }
.btn-s:hover { background: #475569; }
.out {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  font-family: 'SF Mono','Consolas',monospace;
  font-size: 12px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 500px;
  overflow-y: auto;
}
.stat {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--dim);
  margin-bottom: 12px;
}
.stat b { color: var(--text); }
</style>
</head>
<body>
<div class="wrap">
  <h1>⚡ 天翼云盘秒传 JSON 生成器</h1>
  <p class="sub">选择文件 → 自动计算 md5 + slice_md5 → 输出秒传 JSON</p>

  <div class="card">
    <div class="card-t">📁 选择文件（支持多选）</div>
    <div class="drop" id="drop">
      <div class="drop-icon">📂</div>
      <div class="drop-text">点击选择文件，或拖拽文件到此处</div>
    </div>
    <input type="file" id="finput" multiple>
    <div class="flist" id="flist"></div>
  </div>

  <div class="card">
    <div class="card-t">🚀 操作</div>
    <div class="btns">
      <button class="btn btn-p" id="btnGo" disabled>开始计算</button>
      <button class="btn btn-s" id="btnCopy" disabled>复制 JSON</button>
      <button class="btn btn-s" id="btnDl" disabled>下载 JSON</button>
      <button class="btn btn-p" id="btnZip" disabled>下载 .cas 文件</button>
      <button class="btn btn-s" id="btnClear" disabled>清空</button>
    </div>
    <div class="stat" id="stat" style="margin-top:12px;"></div>
  </div>

  <div class="card" id="outCard" style="display:none;">
    <div class="card-t">📋 输出 JSON</div>
    <div class="out" id="out"></div>
  </div>
</div>

<script>
const SLICE = 10 * 1024 * 1024; // 10MB
const CHUNK = 4 * 1024 * 1024;  // 4MB 流式读取块大小
let queue = [];   // {file, state: wait|work|done|fail, md5, sliceMd5, progress}
let running = false;

const $ = id => document.getElementById(id);
const dropEl = $('drop');
const fileInput = $('finput');

dropEl.addEventListener('click', () => fileInput.click());
dropEl.addEventListener('dragover', e => { e.preventDefault(); dropEl.classList.add('over'); });
dropEl.addEventListener('dragleave', () => dropEl.classList.remove('over'));
dropEl.addEventListener('drop', e => {
  e.preventDefault();
  dropEl.classList.remove('over');
  if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => {
  if (e.target.files && e.target.files.length) addFiles(e.target.files);
  e.target.value = '';
});

function addFiles(files) {
  for (const f of files) {
    queue.push({ file: f, state: 'wait', md5: '', sliceMd5: '', progress: 0 });
  }
  renderList();
  $('btnGo').disabled = false;
  $('btnClear').disabled = false;
}

function renderList() {
  const el = $('flist');
  el.innerHTML = '';
  queue.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'frow ' + item.state;
    const stText = { wait:'等待', work:'计算中', done:'✓', fail:'✗' }[item.state];
    const prog = item.state === 'work' && item.progress > 0
      ? ` ${Math.round(item.progress * 100)}%`
      : '';
    row.innerHTML = `
      <div class="name">${esc(item.file.name)}</div>
      <div class="size">${fmt(item.file.size)}</div>
      <div class="st ${item.state}">${stText}${prog}</div>
    `;
    el.appendChild(row);
  });
  updateStat();
}

function updateStat() {
  const total = queue.length;
  const done = queue.filter(q => q.state === 'done').length;
  const fail = queue.filter(q => q.state === 'fail').length;
  const work = queue.filter(q => q.state === 'work').length;
  $('stat').innerHTML = total
    ? `共 <b>${total}</b> 个文件 · 完成 <b>${done}</b> · 失败 <b>${fail}</b> · 进行中 <b>${work}</b>`
    : '';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(b) {
  if (b < 1048576) return (b/1024).toFixed(1)+'KB';
  if (b < 1073741824) return (b/1048576).toFixed(2)+'MB';
  return (b/1073741824).toFixed(2)+'GB';
}

// ── 流式 MD5 计算（使用 SparkMD5 增量哈希，永不分配整个文件内存）──
async function readFileMd5(file, onProgress) {
  // 189云盘 sliceMd5 算法（参考 OpenList 189pc 驱动）：
  // 1. 将文件按 sliceSize(10MB) 分片
  // 2. 计算每个分片的 MD5（大写hex）
  // 3. 用 \n 拼接所有分片MD5，再取拼接字符串的 MD5（大写hex）作为 sliceMd5
  // 4. 如果文件 <= sliceSize，sliceMd5 = fileMd5
  // 所有 MD5 均为大写

  const sliceSize = SLICE; // 10MB（文件<9.66GB时为10MB，参考 partSize 逻辑）
  const fileSize = file.size;

  const fileSpark = new SparkMD5.ArrayBuffer();
  const sliceMd5Hexs = [];
  let off = 0;

  // 逐片读取，每片恰好 sliceSize 字节（最后一片可能不足）
  while (off < fileSize) {
    const sliceEnd = Math.min(off + sliceSize, fileSize);
    const sliceSpark = new SparkMD5.ArrayBuffer();

    // 在当前片内按 CHUNK 分块读取（流式，不一次性载入内存）
    let inner = off;
    while (inner < sliceEnd) {
      const end = Math.min(inner + CHUNK, sliceEnd);
      const buf = await file.slice(inner, end).arrayBuffer();
      fileSpark.append(buf);
      sliceSpark.append(buf);
      inner = end;
      if (onProgress) onProgress(inner / fileSize);
      await new Promise(r => setTimeout(r, 0));
    }

    sliceMd5Hexs.push(sliceSpark.end().toUpperCase());
    off = sliceEnd;
  }

  const fullMd5 = fileSpark.end().toUpperCase();

  // sliceMd5: 如果文件 > sliceSize，取所有分片MD5用\n拼接后的MD5；否则等于fileMd5
  let sliceMd5;
  if (fileSize > sliceSize) {
    const joined = sliceMd5Hexs.join('\n');
    sliceMd5 = SparkMD5.hash(joined).toUpperCase();
  } else {
    sliceMd5 = fullMd5;
  }

  return { md5: fullMd5, sliceMd5 };
}

// ── 主流程 ──
$('btnGo').onclick = async () => {
  if (running) return;
  running = true;
  $('btnGo').disabled = true;
  $('btnClear').disabled = true;

  for (const item of queue) {
    if (item.state === 'done') continue;
    item.state = 'work';
    item.progress = 0;
    renderList();
    try {
      const { md5, sliceMd5 } = await readFileMd5(item.file, (p) => {
        item.progress = p;
        renderList();
      });
      item.md5 = md5;
      item.sliceMd5 = sliceMd5;
      item.state = 'done';
    } catch (e) {
      item.state = 'fail';
      console.error(e);
    }
    renderList();
  }

  running = false;
  $('btnGo').disabled = false;
  $('btnClear').disabled = false;
  outputJson();
};

function buildJson() {
  return queue
    .filter(q => q.state === 'done')
    .map(q => ({
      md5: q.md5,
      slice_md5: q.sliceMd5,
      size: q.file.size,
      name: q.file.name,
      cloud: '189'
    }));
}

function outputJson() {
  const data = buildJson();
  if (!data.length) return;
  const json = JSON.stringify(data, null, 2);
  $('out').textContent = json;
  $('outCard').style.display = '';
  $('btnCopy').disabled = false;
  $('btnDl').disabled = false;
  $('btnZip').disabled = false;
  // 根据文件数量动态更新按钮文字
  $('btnZip').textContent = data.length === 1 ? '下载 .cas 文件' : '下载 .cas 压缩包';
}

$('btnCopy').onclick = () => {
  const text = JSON.stringify(buildJson(), null, 2);
  navigator.clipboard.writeText(text).then(() => {
    $('btnCopy').textContent = '已复制!';
    setTimeout(() => $('btnCopy').textContent = '复制 JSON', 1500);
  });
};

$('btnDl').onclick = () => {
  const text = JSON.stringify(buildJson(), null, 2);
  const blob = new Blob([text], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cas_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
};

$('btnZip').onclick = () => {
  const done = queue.filter(q => q.state === 'done');
  if (!done.length) return;

  // 每个文件生成一个 .cas JSON
  const files = done.map(q => {
    const obj = {
      md5: q.md5,
      slice_md5: q.sliceMd5,
      size: q.file.size,
      name: q.file.name,
      cloud: '189'
    };
    const json = JSON.stringify(obj, null, 2);
    return {
      name: q.file.name + '.cas',
      data: new TextEncoder().encode(json)
    };
  });

  // 单文件：直接下载 .cas，不打包 ZIP
  if (files.length === 1) {
    const blob = new Blob([files[0].data], { type: 'application/octet-stream' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = files[0].name;
    a.click();
    URL.revokeObjectURL(a.href);
    $('btnZip').textContent = '已下载!';
    setTimeout(() => $('btnZip').textContent = '下载 .cas 文件', 1500);
    return;
  }

  // 多文件：用 JSZip 打包（正确处理 UTF-8 中文文件名）
  const zip = new JSZip();
  for (const f of files) {
    zip.file(f.name, f.data);
  }
  zip.generateAsync({ type: 'blob', compression: 'STORE' }).then(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const ts = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
    a.download = `cas_files_${ts}.zip`;
    a.click();
    URL.revokeObjectURL(a.href);
    $('btnZip').textContent = '已下载!';
    setTimeout(() => $('btnZip').textContent = '下载 .cas 压缩包', 1500);
  });
};

$('btnClear').onclick = () => {
  if (running) return;
  queue = [];
  renderList();
  $('outCard').style.display = 'none';
  $('btnGo').disabled = true;
  $('btnCopy').disabled = true;
  $('btnDl').disabled = true;
  $('btnZip').disabled = true;
  $('btnClear').disabled = true;
  $('stat').innerHTML = '';
};
</script>
</body>
</html>
